<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta - Quackly</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/castro.css">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/scrooge-mcduck.png">
</head>
<body>

    <div class="login-card">
        <div class="brand-area">
            <div class="logo-container">
                 <a href="index.html">
                    <img src="images/quackly_logo.png" alt="Logo Quackly" class="logo" style="transform: scale(0.15);">
                </a>
            </div>
            <h2>Quackly</h2>
            <p>Crie sua conta</p>
        </div>

        <button class="btn-social">
            <i class="bi bi-google"></i> Cadastrar com Google
        </button>

        <div class="divider">ou</div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Nome completo <span>*</span></label>
                <input type="text" id="name" placeholder="Como podemos te chamar?" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail <span>*</span></label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha <span>*</span></label>
                <input type="password" id="password" placeholder="Crie uma senha forte" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar senha <span>*</span></label>
                <input type="password" id="confirm-password" placeholder="Repita a senha" required>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    Eu li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.
                </label>
            </div>

            <button type="submit" class="btn-submit">Criar minha conta</button>
        </form>

        <div class="footer-text">
            Já possui uma conta? <a href="login.html">Faça o login!</a>
        </div>
    </div>

</body>
</html>
