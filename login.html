<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quackly</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="icon" type="image/png" href="images/quackly_logo.png">
</head>

<body>
    <div class="login-card">
        <div class="brand-area">
            <div class="logo-container">
                <a href="index.html">
                    <img src="images/quackly_logo.png" alt="Logo Quackly" class="logo" style="transform: scale(0.15);">
                </a>
            </div>
            <h2>Quackly</h2>
            <p id="form-title">Acesse sua conta</p>
        </div>

        <div id="login-form-container" class="form-container">
            <button class="btn-social">
                <i class="bi bi-google"></i> Entrar com conta Google
            </button>
            <button class="btn-social">
                <i class="bi bi-facebook"></i> Entrar com conta Facebook
            </button>

            <div class="divider">ou</div>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="login-email">E-mail <span>*</span></label>
                    <input type="email" id="login-email" placeholder="Adicionar seu e-mail" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Senha <span>*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Adicionar sua senha" required>

                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueci minha senha</a>
                <div class="btn-group">
                    <a href="#" class="btn-submit">Entrar</a>
                    <a href="cadastro.html" class="btn-submit">Cadastrar-se</a>
                </div>

            </form>

            <div class="footer-text">
                Ainda não possui uma conta? <a href="cadastro.html" class="toggle-link">Faça o
                    cadastro!</a>
            </div>
        </div>

</body>

</html>
